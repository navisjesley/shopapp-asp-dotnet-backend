apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Release.Name }}-kv
spec:
  provider: azure
  secretObjects:
  - secretName: {{ .Release.Name }}-secrets
    type: Opaque
    data:
    - objectName: productapi-AzureAd--TenantId
      key: AzureAd__TenantId
    - objectName: productapi-AzureAd--ClientId
      key: AzureAd__ClientId
    - objectName: productapi-AzureAd--Audience
      key: AzureAd__Audience
    - objectName: ConnectionStrings--ProductDb
      key: ConnectionStrings__ProductDb
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "{{ .Values.keyVault.managedIdentityClientId }}"
    keyvaultName: "{{ .Values.keyVault.name }}"
    tenantId: "{{ .Values.keyVault.tenantId }}"
    objects: |
      array:
        - |
          objectName: productapi-AzureAd--TenantId
          objectType: secret
        - |
          objectName: productapi-AzureAd--ClientId
          objectType: secret
        - |
          objectName: productapi-AzureAd--Audience
          objectType: secret
        - |
          objectName: ConnectionStrings--ProductDb
          objectType: secret