replicaCount: 1

image:
  repository: shopappacr.azurecr.io/cartapi
  tag: ""
  pullPolicy: Always

container:
  port: 8080

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
  internalLoadBalancer: true

nodeSelector:
  kubernetes.azure.com/mode: system

aspnetcore:
  urls: "http://+:8080"

azureAd:
  instance: "https://login.microsoftonline.com/"
  testPipeline: "1"

authorization:
  cartApiAccessRole: "CartApi.Access"

keyVault:
  name: shopappkv-prod
  tenantId: 4ca6209d-d0c9-49d9-ad0f-92794eabb398
  managedIdentityClientId: 13affaf5-e598-4810-8bae-3e9d5268e395

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  
  limits:
    cpu: 500m
    memory: 512Mi