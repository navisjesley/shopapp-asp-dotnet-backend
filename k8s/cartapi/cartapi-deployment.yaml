apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartapi
  namespace: shopapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cartapi
  template:
    metadata:
      labels:
        app: cartapi
    spec:
      nodeSelector:
        kubernetes.azure.com/mode: system
      containers:
        - name: cartapi
          image: shopappacr.azurecr.io/cartapi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"

            - name: AzureAd__Instance
              value: "https://login.microsoftonline.com/"

            - name: AzureAd__TenantId
              valueFrom:
                secretKeyRef:
                  name: cartapi-secrets
                  key: AzureAd__TenantId

            - name: AzureAd__ClientId
              valueFrom:
                secretKeyRef:
                  name: cartapi-secrets
                  key: AzureAd__ClientId

            - name: AzureAd__Audience
              valueFrom:
                secretKeyRef:
                  name: cartapi-secrets
                  key: AzureAd__Audience

            - name: Authorization__CartApiAccessRole
              value: "CartApi.Access"

            - name: UserApi__BaseUrl
              valueFrom:
                secretKeyRef:
                  name: cartapi-secrets
                  key: UserApi__BaseUrl

            - name: UserApi__Resource
              valueFrom:
                secretKeyRef:
                  name: cartapi-secrets
                  key: UserApi__Resource

            - name: UserApi__TenantId
              valueFrom:
                secretKeyRef:
                  name: cartapi-secrets
                  key: UserApi__TenantId

            - name: UserApi__ClientId
              valueFrom:
                secretKeyRef:
                  name: cartapi-secrets
                  key: UserApi__ClientId

            - name: UserApi__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: cartapi-secrets
                  key: UserApi__ClientSecret

            - name: ConnectionStrings__CartDb
              valueFrom:
                secretKeyRef:
                  name: cartapi-secrets
                  key: ConnectionStrings__CartDb

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cartapi
  namespace: shopapp
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: cartapi
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP