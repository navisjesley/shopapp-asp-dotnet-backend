apiVersion: apps/v1
kind: Deployment
metadata:
  name: productapi
  namespace: shopapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productapi
  template:
    metadata:
      labels:
        app: productapi
    spec:
      nodeSelector:
        kubernetes.azure.com/mode: system
      containers:
        - name: productapi
          image: shopappacr.azurecr.io/productapi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"

            - name: AzureAd__Instance
              value: "https://login.microsoftonline.com/"

            - name: AzureAd__TenantId
              valueFrom:
                secretKeyRef:
                  name: productapi-secrets
                  key: AzureAd__TenantId

            - name: AzureAd__ClientId
              valueFrom:
                secretKeyRef:
                  name: productapi-secrets
                  key: AzureAd__ClientId

            - name: AzureAd__Audience
              valueFrom:
                secretKeyRef:
                  name: productapi-secrets
                  key: AzureAd__Audience

            - name: Authorization__ProductApiAccessRole
              value: "ProductApi.Access"

            - name: ConnectionStrings__ProductDb
              valueFrom:
                secretKeyRef:
                  name: productapi-secrets
                  key: ConnectionStrings__ProductDb

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: productapi
  namespace: shopapp
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: productapi
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP