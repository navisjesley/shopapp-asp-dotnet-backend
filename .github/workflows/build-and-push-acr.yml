name: Build and Push Changed Services to ACR

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
  AKS_NAMESPACE: ${{ vars.AKS_NAMESPACE }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.matrix }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changed
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git ls-files)
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SERVICES=()

          if echo "$CHANGED_FILES" | grep -qE '^CartAPI/|^k8s/cartapi/'; then
            SERVICES+=('{"name":"cartapi","dockerfile":"CartAPI/Dockerfile","context":"CartAPI","manifest":"k8s/cartapi","deployment":"cartapi","container":"cartapi"}')
          fi

          if echo "$CHANGED_FILES" | grep -qE '^OrderAPI/|^k8s/orderapi/'; then
            SERVICES+=('{"name":"orderapi","dockerfile":"OrderAPI/Dockerfile","context":"OrderAPI","manifest":"k8s/orderapi","deployment":"orderapi","container":"orderapi"}')
          fi

          if echo "$CHANGED_FILES" | grep -qE '^ProductAPI/|^k8s/productapi/'; then
            SERVICES+=('{"name":"productapi","dockerfile":"ProductAPI/Dockerfile","context":"ProductAPI","manifest":"k8s/productapi","deployment":"productapi","container":"productapi"}')
          fi

          if echo "$CHANGED_FILES" | grep -qE '^UserAPI/|^k8s/userapi/'; then
            SERVICES+=('{"name":"userapi","dockerfile":"UserAPI/Dockerfile","context":"UserAPI","manifest":"k8s/userapi","deployment":"userapi","container":"userapi"}')
          fi

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -cs '{include: .}')
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo 'has_changes=true' >> "$GITHUB_OUTPUT"

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with service principal
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push linux/arm64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.name }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.name }}:latest

      - name: Set AKS admin context
        uses: Azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}
          admin: 'true'

      - name: Apply manifests
        run: kubectl apply -f "${{ matrix.manifest }}"

      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ matrix.deployment }} \
            ${{ matrix.container }}=${{ env.ACR_LOGIN_SERVER }}/${{ matrix.name }}:${{ github.sha }} \
            -n "${{ env.AKS_NAMESPACE }}"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ matrix.deployment }} \
            -n "${{ env.AKS_NAMESPACE }}" \
            --timeout=180s
