name: Build and Push Changed Services to ACR

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'CartAPI/**'
      - 'CartAPI.Tests/**'
      - 'ProductAPI/**'
      - 'ProductAPI.Tests/**'
      - 'OrderAPI/**'
      - 'OrderAPI.Tests/**'
      - 'UserAPI/**'
      - 'UserAPI.Tests/**'
      - 'helm/**'
      - '.github/workflows/build-and-push-acr.yml'

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
  AKS_NAMESPACE: ${{ vars.AKS_NAMESPACE }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.matrix }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changed
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git ls-files)
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SERVICES=()

          if echo "$CHANGED_FILES" | grep -qE '^CartAPI/|^helm/cartapi/'; then
            SERVICES+=('{"name":"cartapi","dockerfile":"CartAPI/Dockerfile","context":"CartAPI","chart":"helm/cartapi"}')
          fi

          if echo "$CHANGED_FILES" | grep -qE '^OrderAPI/|^helm/orderapi/'; then
            SERVICES+=('{"name":"orderapi","dockerfile":"OrderAPI/Dockerfile","context":"OrderAPI","chart":"helm/orderapi"}')
          fi

          if echo "$CHANGED_FILES" | grep -qE '^ProductAPI/|^helm/productapi/'; then
            SERVICES+=('{"name":"productapi","dockerfile":"ProductAPI/Dockerfile","context":"ProductAPI","chart":"helm/productapi"}')
          fi

          if echo "$CHANGED_FILES" | grep -qE '^UserAPI/|^helm/userapi/'; then
            SERVICES+=('{"name":"userapi","dockerfile":"UserAPI/Dockerfile","context":"UserAPI","chart":"helm/userapi"}')
          fi

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -cs '{include: .}')
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo 'has_changes=true' >> "$GITHUB_OUTPUT"

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push linux/arm64 image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.name }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.name }}:latest

      - name: Set AKS admin context
        uses: Azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}
          admin: 'true'

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy via Helm upgrade
        run: |
          helm upgrade --install ${{ matrix.name }} \
          ./${{ matrix.chart }} \
          --namespace ${{ env.AKS_NAMESPACE }} \
          --create-namespace \
          --set image.tag=${{ github.sha }} \
          --wait \
          --timeout 5m

      - name: Debug deployment
        if: failure()
        run: |
          kubectl get pods -n ${{ env.AKS_NAMESPACE }}
          kubectl describe deployment ${{ matrix.name }} -n ${{ env.AKS_NAMESPACE }}
          kubectl describe pods -n ${{ env.AKS_NAMESPACE }}