name: Build and Deploy Changed Services to AKS

on:
  push:
    branches:
      - main
    paths:
      - 'CartAPI/**'
      - 'OrderAPI/**'
      - 'ProductAPI/**'
      - 'UserAPI/**'
      - 'helm/**'
      - '.github/workflows/build-and-push-acr.yml'

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.matrix }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changed
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git ls-files)
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SERVICES=()

          if echo "$CHANGED_FILES" | grep -qE '^CartAPI/|^helm/cartapi/'; then
            SERVICES+=('{"name":"cartapi","dockerfile":"CartAPI/Dockerfile","context":"CartAPI","chart":"helm/cartapi"}')
          fi

          if echo "$CHANGED_FILES" | grep -qE '^OrderAPI/|^helm/orderapi/'; then
            SERVICES+=('{"name":"orderapi","dockerfile":"OrderAPI/Dockerfile","context":"OrderAPI","chart":"helm/orderapi"}')
          fi

          if echo "$CHANGED_FILES" | grep -qE '^ProductAPI/|^helm/productapi/'; then
            SERVICES+=('{"name":"productapi","dockerfile":"ProductAPI/Dockerfile","context":"ProductAPI","chart":"helm/productapi"}')
          fi

          if echo "$CHANGED_FILES" | grep -qE '^UserAPI/|^helm/userapi/'; then
            SERVICES+=('{"name":"userapi","dockerfile":"UserAPI/Dockerfile","context":"UserAPI","chart":"helm/userapi"}')
          fi

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -cs '{include: .}')
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  build-and-deploy-test:
    name: Build and Deploy To Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    environment: test
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build And Push Linux/ARM64 Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: |
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.name }}:${{ github.sha }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.name }}:latest

      - name: Set AKS Admin Context
        uses: Azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}
          admin: 'true'

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy To Test
        run: |
          helm upgrade --install ${{ matrix.name }} \
          ./${{ matrix.chart }} \
          --namespace ${{ vars.AKS_NAMESPACE }} \
          --create-namespace \
          -f ./${{ matrix.chart }}/values-test.yaml \
          --set image.tag=${{ github.sha }} \
          --wait \
          --timeout 10m

      - name: Debug Deployment
        if: failure()
        run: |
          kubectl get pods -n ${{ vars.AKS_NAMESPACE }}
          kubectl describe deployment ${{ matrix.name }} -n ${{ vars.AKS_NAMESPACE }}
          kubectl describe pods -n ${{ vars.AKS_NAMESPACE }}

  deploy-prod:
    name: Deploy To Production
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - deploy-test
    if: needs.detect-changes.outputs.has_changes == 'true'
    environment: prod
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Admin Context
        uses: Azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}
          admin: 'true'

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy To Production
        run: |
          helm upgrade --install ${{ matrix.name }} \
          ./${{ matrix.chart }} \
          --namespace ${{ vars.AKS_NAMESPACE }} \
          --create-namespace \
          -f ./${{ matrix.chart }}/values-prod.yaml \
          --set image.tag=${{ github.sha }} \
          --wait \
          --timeout 10m

      - name: Debug Deployment
        if: failure()
        run: |
          kubectl get pods -n ${{ vars.AKS_NAMESPACE }}
          kubectl describe deployment ${{ matrix.name }} -n ${{ vars.AKS_NAMESPACE }}
          kubectl describe pods -n ${{ vars.AKS_NAMESPACE }}